<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今日头条自动化 - 控制面板</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div class="logo-icon">🎯</div>
                <div class="logo-text">头条<span>自动化</span></div>
            </div>
            <ul class="sidebar-nav">
                <li class="nav-item">
                    <a href="#section-dashboard" class="nav-link active" data-section="section-dashboard">
                        <i class="fas fa-tachometer-alt"></i>
                        <span>控制面板</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#section-accounts" class="nav-link" data-section="section-accounts">
                        <i class="fas fa-user-circle"></i>
                        <span>账号管理</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#section-config" class="nav-link" data-section="section-config">
                        <i class="fas fa-cog"></i>
                        <span>系统配置</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#section-logs" class="nav-link" data-section="section-logs">
                        <i class="fas fa-file-alt"></i>
                        <span>运行日志</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#section-stats" class="nav-link" data-section="section-stats">
                        <i class="fas fa-chart-line"></i>
                        <span>数据统计</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link" id="nav-help">
                        <i class="fas fa-question-circle"></i>
                        <span>帮助文档</span>
                    </a>
                </li>
            </ul>
            <div class="sidebar-footer">
                <div style="margin-bottom: 15px;">
                    <button id="theme-toggle" class="btn" style="width: 100%; padding: 10px; font-size: 0.9em;">
                        <i class="fas fa-moon"></i> <span>暗黑模式</span>
                    </button>
                </div>
                <p class="version-info">v1.0.0 | 2025</p>
            </div>
        </aside>

        <main class="main-content">
            <div class="container">
                <header>
                    <h1>🎯 今日头条<span>自动化脚本</span></h1>
                    <p class="subtitle">Web 控制面板，轻松管理自动化任务</p>
                </header>

                <section id="section-dashboard">
                    <div class="status-card glass-card">
                        <div class="status-header">
                            <h2><i class="fas fa-heartbeat"></i> 运行状态</h2>
                            <span id="status-indicator" class="status-indicator stopped">
                                <i class="fas fa-power-off"></i> 已停止
                            </span>
                        </div>
                        <div class="status-info">
                            <p><i class="fas fa-clock"></i> <strong>启动时间:</strong> <span id="start-time">-</span></p>
                            <p><i class="fas fa-sync-alt"></i> <strong>当前循环:</strong> <span id="current-cycle">0</span> / <span id="total-cycles">0</span></p>
                            <p><i class="fas fa-comment"></i> <strong>评论功能:</strong> <span id="comment-status" style="color: #28a745; font-weight: bold;">✅ 已启用 (100% 概率)</span></p>
                        </div>
                    </div>

                    <div class="control-buttons">
                        <button id="start-btn" class="btn btn-start">
                            <i class="fas fa-play"></i> 启动脚本
                        </button>
                        <button id="stop-btn" class="btn btn-stop" disabled>
                            <i class="fas fa-stop"></i> 停止脚本
                        </button>
                    </div>
                </section>

                <section id="section-stats">
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-value" id="total-links">0</div>
                            <div class="stat-label">总处理链接</div>
                        </div>
                        <div class="stat-card success">
                            <div class="stat-value" id="success-likes">0</div>
                            <div class="stat-label">成功点赞</div>
                        </div>
                        <div class="stat-card error">
                            <div class="stat-value" id="failed-likes">0</div>
                            <div class="stat-label">失败点赞</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="success-rate">0%</div>
                            <div class="stat-label">成功率</div>
                        </div>
                    </div>
                </section>

                <section id="section-accounts">
                    <div class="accounts-card">
                        <div class="accounts-header">
                            <h2><i class="fas fa-users"></i> 账号管理</h2>
                            <button id="add-account-btn" class="btn btn-export">
                                <i class="fas fa-plus"></i> 添加账号
                            </button>
                        </div>
                        <div id="accounts-container" class="accounts-container">
                            <p class="log-empty">加载中...</p>
                        </div>
                    </div>
                </section>

                <section id="section-config">
                    <div class="config-card">
                        <div class="config-header">
                            <h2><i class="fas fa-cogs"></i> 系统配置</h2>
                            <button id="save-config-btn" class="btn btn-export">
                                <i class="fas fa-save"></i> 保存配置
                            </button>
                        </div>
                        <div class="config-grid">
                            <div class="config-group">
                                <h3><i class="fas fa-percentage"></i> 操作概率</h3>
                                <div class="form-group">
                                    <label><i class="fas fa-thumbs-up"></i> 点赞率(%)</label>
                                    <input type="number" id="config-like-rate" class="form-input" value="100" min="0" max="100">
                                </div>
                                <div class="form-group">
                                    <label><i class="fas fa-comment-dots"></i> 评论率(%)</label>
                                    <input type="number" id="config-comment-rate" class="form-input" value="100" min="0" max="100">
                                </div>
                            </div>

                            <div class="config-group">
                                <h3><i class="fas fa-sliders-h"></i> 基础配置</h3>
                                <div class="form-group">
                                    <label><i class="fas fa-hourglass-start"></i> 最小延迟(秒)</label>
                                    <input type="number" id="config-min-delay" class="form-input" value="2" min="1">
                                </div>
                                <div class="form-group">
                                    <label><i class="fas fa-hourglass-end"></i> 最大延迟(秒)</label>
                                    <input type="number" id="config-max-delay" class="form-input" value="4" min="1">
                                </div>
                                <div class="form-group">
                                    <label><i class="fas fa-redo"></i> 最大重试次数</label>
                                    <input type="number" id="config-max-retries" class="form-input" value="2" min="0">
                                </div>
                                <div class="form-group">
                                    <label><i class="fas fa-link"></i> 每次处理推荐内容数</label>
                                    <input type="number" id="config-max-links" class="form-input" value="20" min="1">
                                </div>
                            </div>

                            <div class="config-group">
                                <h3><i class="fas fa-recycle"></i> 循环配置</h3>
                                <div class="form-group">
                                    <label><i class="fas fa-infinity"></i> 最大循环次数</label>
                                    <input type="number" id="config-max-cycles" class="form-input" value="5" min="1">
                                </div>
                                <div class="form-group">
                                    <label><i class="fas fa-hourglass-half"></i> 循环间隔(分钟)</label>
                                    <input type="number" id="config-cycle-interval" class="form-input" value="60" min="1">
                                </div>
                                <div class="form-group">
                                    <label><i class="fas fa-user-friends"></i> 每次处理用户数</label>
                                    <input type="number" id="config-users-per-cycle" class="form-input" value="10" min="1">
                                </div>
                                <div class="form-group">
                                    <label><i class="fas fa-video"></i> 每个用户处理视频数</label>
                                    <input type="number" id="config-videos-per-user" class="form-input" value="5" min="1">
                                </div>
                            </div>

                            <div class="config-group">
                                <h3><i class="fas fa-browser"></i> 浏览器配置</h3>
                                <div class="form-group">
                                    <label>
                                        <input type="checkbox" id="config-headless">
                                        <i class="fas fa-eye-slash"></i> 无头模式(后台运行)
                                    </label>
                                </div>
                                <div class="form-group">
                                    <label>
                                        <input type="checkbox" id="config-maximize" checked>
                                        <i class="fas fa-expand"></i> 最大化窗口
                                    </label>
                                </div>
                                <div class="form-group">
                                    <label>
                                        <input type="checkbox" id="config-proxy-enabled">
                                        <i class="fas fa-network-wired"></i> 启用代理池
                                    </label>
                                </div>
                                <div class="form-group">
                                    <label><i class="fas fa-list"></i> 代理池(每行一个代理)</label>
                                    <textarea id="config-proxy-pool" class="form-input" rows="4" placeholder="例如: http://127.0.0.1:8080&#10;socks5://127.0.0.1:1080"></textarea>
                                </div>
                            </div>

                            <div class="config-group">
                                <h3><i class="fas fa-file-lines"></i> 日志配置</h3>
                                <div class="form-group">
                                    <label><i class="fas fa-filter"></i> 日志级别</label>
                                    <select id="config-log-level" class="form-input">
                                        <option value="DEBUG">DEBUG</option>
                                        <option value="INFO" selected>INFO</option>
                                        <option value="WARNING">WARNING</option>
                                        <option value="ERROR">ERROR</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label><i class="fas fa-folder-open"></i> 日志目录</label>
                                    <input type="text" id="config-log-dir" class="form-input" value="logs">
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <section id="section-logs">
                    <div class="logs-card">
                        <div class="config-header">
                            <h2><i class="fas fa-file-text"></i> 运行日志</h2>
                            <div style="display: flex; gap: 10px; align-items: center;">
                                <div style="position: relative;">
                                    <input type="text" id="log-search" class="form-input" placeholder="搜索日志..." style="width: 200px; padding-right: 30px;">
                                    <i class="fas fa-search" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                                </div>
                                <select id="log-level-filter" class="form-input" style="width: 120px;">
                                    <option value="all">全部级别</option>
                                    <option value="INFO">INFO</option>
                                    <option value="WARNING">WARNING</option>
                                    <option value="ERROR">ERROR</option>
                                    <option value="DEBUG">DEBUG</option>
                                </select>
                                <button id="clear-logs-btn" class="btn btn-delete" style="padding: 8px 16px;">
                                    <i class="fas fa-trash"></i> 清空
                                </button>
                            </div>
                        </div>
                        <div id="logs-container" class="logs-container">
                            <p class="log-empty">暂无日志...</p>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <div id="account-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title"><i class="fas fa-user-plus"></i> 添加账号</h3>
                <span class="close-btn">&times;</span>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label><i class="fas fa-user-tag"></i> 账号名称</label>
                    <input type="text" id="account-name" class="form-input" placeholder="例如：工作账号">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-cookie"></i> Cookie 文件</label>
                    <input type="text" id="account-cookie" class="form-input" placeholder="例如：toutiao_cookies.pkl">
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="account-enabled" checked>
                        <i class="fas fa-check-circle"></i> 启用账号
                    </label>
                </div>
            </div>
            <div class="modal-footer">
                <button id="cancel-modal" class="btn">
                    <i class="fas fa-times"></i> 取消
                </button>
                <button id="save-account" class="btn btn-start">
                    <i class="fas fa-save"></i> 保存
                </button>
            </div>
        </div>
    </div>

    <!-- Toast 容器 -->
    <div id="toast-container" class="toast-container"></div>

    <script src="/static/js/main.js"></script>
</body>
</html>
